<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Live Results - Cloud Voting Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
      :root {
        --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        --card-bg: rgba(30, 41, 59, 0.7);
        --card-border: rgba(255, 255, 255, 0.08);
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --color-a: #3b82f6; /* Blue for Cats */
        --color-b: #ec4899; /* Pink/Purple for Dogs */
        --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Outfit', sans-serif;
        background: var(--bg-gradient);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
        overflow-x: hidden;
      }

      .container {
        max-width: 800px;
        width: 100%;
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--card-border);
        border-radius: 24px;
        padding: 40px;
        box-shadow: var(--shadow);
        text-align: center;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 800;
        margin-bottom: 10px;
        background: linear-gradient(to right, #60a5fa, #f472b6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .subtitle {
        color: var(--text-secondary);
        font-size: 1.1rem;
        margin-bottom: 40px;
        font-weight: 300;
      }

      .results-grid {
        display: flex;
        gap: 30px;
        margin-bottom: 40px;
      }

      @media (max-width: 600px) {
        .results-grid {
          flex-direction: column;
        }
      }

      .result-card {
        flex: 1;
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        transition: transform 0.3s ease;
      }

      .result-card:hover {
        transform: translateY(-3px);
      }

      .result-card.card-a {
        border-left: 4px solid var(--color-a);
      }

      .result-card.card-b {
        border-left: 4px solid var(--color-b);
      }

      .emoji {
        font-size: 3.5rem;
      }

      .label {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--text-secondary);
      }

      .count {
        font-size: 3rem;
        font-weight: 800;
        line-height: 1;
      }

      .card-a .count {
        color: var(--color-a);
      }

      .card-b .count {
        color: var(--color-b);
      }

      .percent {
        font-size: 1.1rem;
        font-weight: 500;
        opacity: 0.8;
      }

      /* Progress Bar */
      .progress-container {
        width: 100%;
        background: rgba(15, 23, 42, 0.6);
        height: 32px;
        border-radius: 16px;
        overflow: hidden;
        display: flex;
        margin-bottom: 30px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .bar {
        height: 100%;
        transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        font-weight: 600;
        color: white;
        text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      }

      .bar-a {
        background: linear-gradient(90deg, #2563eb, var(--color-a));
        width: 50%;
      }

      .bar-b {
        background: linear-gradient(90deg, var(--color-b), #db2777);
        width: 50%;
      }

      .total-votes {
        font-size: 1.1rem;
        color: var(--text-secondary);
        margin-bottom: 10px;
        font-weight: 400;
      }

      .total-votes span {
        color: var(--text-primary);
        font-weight: 600;
      }

      .live-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(239, 68, 68, 0.15);
        color: #ef4444;
        padding: 6px 12px;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 20px;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }

      .live-dot {
        width: 8px;
        height: 8px;
        background-color: #ef4444;
        border-radius: 50%;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
        }
        70% {
          transform: scale(1);
          box-shadow: 0 0 0 6px rgba(239, 68, 68, 0);
        }
        100% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="live-badge">
        <span class="live-dot"></span>
        Live Connection
      </div>
      <h1>Real-Time Results</h1>
      <p class="subtitle">Watch as votes are processed and tabulated dynamically.</p>
      
      <div class="results-grid">
        <div class="result-card card-a">
          <span class="emoji">🐱</span>
          <span class="label">Cats</span>
          <span id="count-a" class="count">0</span>
          <span id="percent-a" class="percent">50%</span>
        </div>
        
        <div class="result-card card-b">
          <span class="emoji">🐶</span>
          <span class="label">Dogs</span>
          <span id="count-b" class="count">0</span>
          <span id="percent-b" class="percent">50%</span>
        </div>
      </div>

      <div class="progress-container">
        <div id="bar-a" class="bar bar-a">50%</div>
        <div id="bar-b" class="bar bar-b">50%</div>
      </div>

      <div class="total-votes">
        Total votes cast: <span id="total-count">0</span>
      </div>
    </div>

    <script>
      const socket = io();

      socket.on('scores', (data) => {
        const countA = data.a || 0;
        const countB = data.b || 0;
        const total = countA + countB;

        let pctA = 50;
        let pctB = 50;

        if (total > 0) {
          pctA = Math.round((countA / total) * 100);
          pctB = Math.round((countB / total) * 100);
        }

        // Update counts
        document.getElementById('count-a').innerText = countA;
        document.getElementById('count-b').innerText = countB;
        document.getElementById('total-count').innerText = total;

        // Update percentages text
        document.getElementById('percent-a').innerText = `${pctA}%`;
        document.getElementById('percent-b').innerText = `${pctB}%`;

        // Update progress bar widths
        const barA = document.getElementById('bar-a');
        const barB = document.getElementById('bar-b');
        
        barA.style.width = `${pctA}%`;
        barB.style.width = `${pctB}%`;

        // Show/hide labels inside bar based on width
        barA.innerText = pctA >= 10 ? `${pctA}%` : '';
        barB.innerText = pctB >= 10 ? `${pctB}%` : '';
      });
    </script>
  </body>
</html>
