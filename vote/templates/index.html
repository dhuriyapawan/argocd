<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{option_a}} vs {{option_b}} - Cloud Voting Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        --card-bg: rgba(30, 41, 59, 0.7);
        --card-border: rgba(255, 255, 255, 0.08);
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --color-a: #3b82f6; /* Blue */
        --color-a-hover: #60a5fa;
        --color-b: #ec4899; /* Pink/Purple */
        --color-b-hover: #f472b6;
        --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Outfit', sans-serif;
        background: var(--bg-gradient);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
        overflow-x: hidden;
      }

      .container {
        max-width: 600px;
        width: 100%;
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--card-border);
        border-radius: 24px;
        padding: 40px;
        box-shadow: var(--shadow);
        text-align: center;
        transition: transform 0.3s ease;
      }

      .container:hover {
        transform: translateY(-5px);
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 800;
        margin-bottom: 10px;
        background: linear-gradient(to right, #60a5fa, #f472b6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .subtitle {
        color: var(--text-secondary);
        font-size: 1.1rem;
        margin-bottom: 40px;
        font-weight: 300;
      }

      .vote-form {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-bottom: 30px;
      }

      @media (max-width: 480px) {
        .vote-form {
          flex-direction: column;
        }
      }

      .btn-vote {
        flex: 1;
        background: transparent;
        border: 2px solid;
        border-radius: 16px;
        padding: 24px;
        font-size: 1.25rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        position: relative;
        overflow: hidden;
      }

      .btn-vote::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 0.25s ease;
        z-index: -1;
      }

      .btn-a {
        color: var(--color-a);
        border-color: rgba(59, 130, 246, 0.4);
      }

      .btn-a::before {
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(59, 130, 246, 0.05) 100%);
      }

      .btn-a:hover {
        border-color: var(--color-a);
        transform: translateY(-3px);
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
      }

      .btn-a:hover::before {
        opacity: 1;
      }

      .btn-b {
        color: var(--color-b);
        border-color: rgba(236, 72, 153, 0.4);
      }

      .btn-b::before {
        background: linear-gradient(135deg, rgba(236, 72, 153, 0.2) 0%, rgba(236, 72, 153, 0.05) 100%);
      }

      .btn-b:hover {
        border-color: var(--color-b);
        transform: translateY(-3px);
        box-shadow: 0 0 20px rgba(236, 72, 153, 0.3);
      }

      .btn-b:hover::before {
        opacity: 1;
      }

      .btn-vote span.icon {
        font-size: 2.5rem;
      }

      .btn-vote span.label {
        color: var(--text-primary);
      }

      .confirmation {
        margin-top: 20px;
        padding: 15px;
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.3);
        border-radius: 12px;
        color: #34d399;
        font-weight: 500;
        animation: slideUp 0.4s ease-out forwards;
      }

      .footer {
        margin-top: 30px;
        color: var(--text-secondary);
        font-size: 0.85rem;
        opacity: 0.7;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Make Your Choice</h1>
      <p class="subtitle">Cast your vote to shape the future. Results update in real-time!</p>
      
      <form id="choice" method="POST" class="vote-form">
        <button id="a" type="submit" name="vote" value="a" class="btn-vote btn-a">
          <span class="icon">🐱</span>
          <span class="label">{{option_a}}</span>
        </button>
        <button id="b" type="submit" name="vote" value="b" class="btn-vote btn-b">
          <span class="icon">🐶</span>
          <span class="label">{{option_b}}</span>
        </button>
      </form>

      {% if vote %}
      <div class="confirmation">
        You voted for {{ option_a if vote == 'a' else option_b }}! Thank you for participating.
      </div>
      {% endif %}

      <div class="footer">
        Processed by host: <code>{{hostname}}</code>
      </div>
    </div>
  </body>
</html>
