# Default values for voting-app.
# This is a YAML-formatted file.

replicaCount: 1

image:
  vote:
    repository: 878445923420.dkr.ecr.us-east-1.amazonaws.com/vote
    pullPolicy: IfNotPresent
    tag: "latest"
  worker:
    repository: 878445923420.dkr.ecr.us-east-1.amazonaws.com/worker
    pullPolicy: IfNotPresent
    tag: "latest"
  result:
    repository: 878445923420.dkr.ecr.us-east-1.amazonaws.com/result
    pullPolicy: IfNotPresent
    tag: "latest"
  redis:
    repository: redis
    tag: "7.0-alpine"
  postgres:
    repository: postgres
    tag: "16-alpine"

service:
  vote:
    type: ClusterIP
    port: 80
  result:
    type: ClusterIP
    port: 80
  redis:
    type: ClusterIP
    port: 6379
  postgres:
    type: ClusterIP
    port: 5432

postgres:
  db: db
  user: postgres
  password: postgrespassword123
  database: postgres

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: vote.local
      paths:
        - path: /
          pathType: Prefix
          backendService: vote
          backendPort: 80
    - host: result.local
      paths:
        - path: /
          pathType: Prefix
          backendService: result
          backendPort: 80
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
