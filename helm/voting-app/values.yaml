service:
  vote:
    type: ClusterIP
    port: 80
  result:
    type: ClusterIP
    port: 80
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: voting.local
      paths:
        - path: /
          pathType: Prefix
          backendService: vote
          backendPort: 80
        - path: /result
          pathType: Prefix
          backendService: result
          backendPort: 80
  tls: []
image:
  vote:
    tag: 2d1cce1370cb1a5e2a4601beabdc7cb947e051a3
  worker:
    tag: 2d1cce1370cb1a5e2a4601beabdc7cb947e051a3
  result:
    tag: 2d1cce1370cb1a5e2a4601beabdc7cb947e051a3
