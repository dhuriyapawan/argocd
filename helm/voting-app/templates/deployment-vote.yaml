apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-vote
  labels:
    app: vote
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels: 
        app: vote
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: vote
          image: "{{ .Values.image.vote.repository }}:{{ .Values.image.vote.tag }}"
          imagePullPolicy: {{ .Values.image.vote.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
          env:
            - name: REDIS_HOST
              value: "{{ .Release.Name }}-redis"
            - name: REDIS_PORT
              value: "6379"
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
