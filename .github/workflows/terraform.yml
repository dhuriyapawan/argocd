name: Terraform CI

on:
  push:
    branches:
      - devops-featureA
  pull_request:
    branches:
      - dev

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform
        
    permissions:
      contents: read
      id-token: write
      # Allow writing to state if using remote backend with S3/TF Cloud
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          # Expect AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY secrets
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          # Or use static keys if you set them as secrets
          #aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          #aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (boto3)
        run: pip install boto3

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Run maintenance script
        id: maintain
        env:
          TF_VAR_region: "eu-north-1"
          TF_VAR_vpc_id: "${{ secrets.VPC_ID }}"
        run: python ../scripts/maintain.py