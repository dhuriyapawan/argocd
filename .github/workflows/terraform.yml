name: Terraform CI

on:
  push:
    branches:
      - devops-featureA
  pull_request:
    branches:
      - dev

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform
    permissions:
      contents: read
      id-token: write
      # Allow writing to state if using remote backend with S3/TF Cloud
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-north-1
          # Expect AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY secrets
          # role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          # Or use static keys if you set them as secrets
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check -recursive

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false -no-color
        env:
          TF_VAR_region: "us-east-2"

      - name: Terraform Apply (on push to main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_region: "us-east-2"